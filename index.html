<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VaultKey - مولد كلمات مرور آمن يعمل محلياً 100% بدون إنترنت">

    <!-- جلب الخطوط من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #09090e;
            --surface: #14141f;
            --surface-hover: #1c1c2b;
            --border: #2a2a40;
            --text: #f0f0f5;
            --text-muted: #8e8ea0;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(circle at 85% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 15% 30%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 540px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .card {
            background: rgba(20, 20, 31, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* منطقة العرض */
        .display-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .display-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        #password-output {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            width: 100%;
            outline: none;
            letter-spacing: 1px;
            direction: ltr; /* هام لتبقى كلمة المرور الإنجليزية مقروءة بشكل صحيح */
            text-align: left;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            margin-right: 1rem;
        }

        .copy-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        /* مؤشر القوة */
        .strength-container {
            margin-bottom: 2rem;
        }

        .strength-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .strength-bars {
            display: flex;
            gap: 6px;
            height: 6px;
            margin-bottom: 0.8rem;
            flex-direction: row-reverse; /* ليتناسب مع اتجاه القوة */
        }

        .bar {
            flex: 1;
            background: var(--border);
            border-radius: 4px;
            transition: var(--transition);
        }

        .crack-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        .crack-time span {
            color: var(--text);
            font-weight: 700;
            direction: ltr;
            display: inline-block;
        }

        /* التبويبات */
        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 1.5rem;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .tab.active {
            background: var(--surface-hover);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* عناصر التحكم */
        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 4px;
            outline: none;
            margin-bottom: 1rem;
            direction: ltr; /* للحفاظ على حركة السلايدر طبيعية */
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.8rem;
            background: var(--surface-hover);
            border: 1px solid transparent;
            border-radius: 10px;
            transition: var(--transition);
        }

        .checkbox-group:hover {
            background: rgba(42, 42, 64, 0.8);
            border-color: var(--border);
        }

        .checkbox-group input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .checkbox-group input:checked + .custom-checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }

        .custom-checkbox::after {
            content: '';
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            display: none;
        }

        .checkbox-group input:checked + .custom-checkbox::after {
            display: block;
        }

        .label-text {
            font-size: 0.95rem;
            user-select: none;
            font-weight: 600;
        }

        .generate-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.4);
        }

        .generate-btn:active {
            transform: translateY(1px);
        }

        select {
            width: 100%;
            padding: 0.8rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
        }

        .security-badge {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            opacity: 0.9;
        }

        /* رسالة منبثقة (Toast) */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            transition: var(--transition);
            opacity: 0;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
            .card { padding: 1.5rem; }
            #password-output { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <script>
        // المتغيرات وعناصر الواجهة
        const passwordOutput = document.getElementById('password-output');
        const copyBtn = document.getElementById('copy-btn');
        const generateBtn = document.getElementById('generate-btn');
        const toast = document.getElementById('toast');
        
        const tabs = document.querySelectorAll('.tab');
        const tabContents = document.querySelectorAll('.tab-content');
        
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const cbUpper = document.getElementById('cb-upper');
        const cbLower = document.getElementById('cb-lower');
        const cbNumbers = document.getElementById('cb-numbers');
        const cbSymbols = document.getElementById('cb-symbols');
        const allCheckboxes =[cbUpper, cbLower, cbNumbers, cbSymbols];
        
        const wordSlider = document.getElementById('word-slider');
        const wordCountVal = document.getElementById('word-count-val');
        const separatorSelect = document.getElementById('separator-select');
        const cbCapitalize = document.getElementById('cb-capitalize');

        const bars =[
            document.getElementById('bar-1'),
            document.getElementById('bar-2'),
            document.getElementById('bar-3'),
            document.getElementById('bar-4')
        ];
        const strengthLabel = document.getElementById('strength-label');
        const timeToCrackEl = document.getElementById('time-to-crack');

        // مجموعات الرموز
        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        // قائمة كلمات (256 كلمة) لضمان حساب الإنتروبي بشكل دقيق (8 بت لكل كلمة)
        // الكلمات إنجليزية لأن الأنظمة العالمية تتعامل معها بشكل أفضل في كلمات المرور
        const wordlist =[

            "chicken", "duck", "goose", "turkey", "hound", "puppy", "kitten", "feline", "canine", "bird",
            "fish", "shark", "whale", "dolphin", "seal", "walrus", "otter", "beaver", "badger", "fox",

            "tail", "wing", "feather", "beak", "nest", "cave", "den", "burrow", "tunnel", "road",

            "county", "state", "nation", "border", "coast", "shore", "beach", "cliff", "ridge", "peak"
        ]; // Exactly 256 words = 8 bits of entropy per word

        let currentMode = 'random'; 

        // --- التوليد التشفيري الآمن (Cryptographically Secure) ---
        
        // دالة توليد رقم عشوائي آمن مع منع مشكلة الانحياز الحسابي (Modulo Bias)
        function getSecureRandomInt(max) {
            const array = new Uint32Array(1);
            const limit = 4294967296 - (4294967296 % max);
            do {
                window.crypto.getRandomValues(array);
            } while (array[0] >= limit);
            return array[0] % max;
        }

        // توليد كلمة مرور عشوائية
        function generateRandomPassword() {
            let charset = '';
            if (cbUpper.checked) charset += chars.upper;
            if (cbLower.checked) charset += chars.lower;
            if (cbNumbers.checked) charset += chars.numbers;
            if (cbSymbols.checked) charset += chars.symbols;

            // في حال ألغى المستخدم تحديد جميع الخيارات
            if (charset === '') {
                cbLower.checked = true;
                charset = chars.lower;
            }

            const length = parseInt(lengthSlider.value);
            let password = '';
            
            // التأكد من وجود حرف واحد على الأقل من كل مجموعة تم اختيارها
            const requiredChars = [];
            if (cbUpper.checked) requiredChars.push(chars.upper[getSecureRandomInt(chars.upper.length)]);
            if (cbLower.checked) requiredChars.push(chars.lower[getSecureRandomInt(chars.lower.length)]);
            if (cbNumbers.checked) requiredChars.push(chars.numbers[getSecureRandomInt(chars.numbers.length)]);
            if (cbSymbols.checked) requiredChars.push(chars.symbols[getSecureRandomInt(chars.symbols.length)]);

            // ملء باقي الطول بشكل عشوائي
            for (let i = requiredChars.length; i < length; i++) {
                password += charset[getSecureRandomInt(charset.length)];
            }

            // خلط الحروف الإجبارية مع باقي السلسلة بشكل عشوائي
            let passArray = password.split('');
            requiredChars.forEach(char => {
                const insertPos = getSecureRandomInt(passArray.length + 1);
                passArray.splice(insertPos, 0, char);
            });

            return passArray.join('');
        }

        // توليد العبارة (Passphrase)
        function generatePassphrase() {
            const count = parseInt(wordSlider.value);
            const separator = separatorSelect.value;
            const capitalize = cbCapitalize.checked;
            
            let phraseWords =[];
            for(let i = 0; i < count; i++) {
                let word = wordlist[getSecureRandomInt(wordlist.length)];
                if(capitalize) {
                    word = word.charAt(0).toUpperCase() + word.slice(1);
                }
                phraseWords.push(word);
            }
            return phraseWords.join(separator);
        }

        // --- حساب قوة كلمة المرور ---
        function calculateEntropy(password) {
            if (currentMode === 'passphrase') {
                // الانتروبي للعبارة = عدد الكلمات × اللوغاريتم الثنائي لعدد الكلمات في القاموس
                const count = parseInt(wordSlider.value);
                return count * Math.log2(wordlist.length); // log2(256) = 8 bits per word
            } else {
                // الانتروبي للرموز العشوائية
                let poolSize = 0;
                if (cbUpper.checked) poolSize += 26;
                if (cbLower.checked) poolSize += 26;
                if (cbNumbers.checked) poolSize += 10;
                if (cbSymbols.checked) poolSize += chars.symbols.length;
                
                if (poolSize === 0) poolSize = 26;
                return password.length * Math.log2(poolSize);
            }
        }

        function formatCrackTime(entropy) {
            // افتراض أن المخترق يستطيع تجربة 100 مليار احتمال في الثانية
            const guessesPerSecond = 100000000000; 
            const combinations = Math.pow(2, entropy);
            const seconds = combinations / guessesPerSecond;

            if (seconds < 1) return "فوراً";
            if (seconds < 60) return "بضع ثوانٍ";
            if (seconds < 3600) return `${Math.floor(seconds/60)} دقائق`;
            if (seconds < 86400) return `${Math.floor(seconds/3600)} ساعات`;
            if (seconds < 31536000) return `${Math.floor(seconds/86400)} أيام`;
            if (seconds < 3153600000) return `${Math.floor(seconds/31536000)} سنوات`;
            return "قرون 🔒";
        }

        function updateUIStrength(password) {
            const entropy = calculateEntropy(password);
            
            // إعادة ضبط الألوان
            bars.forEach(bar => {
                bar.style.background = 'var(--border)';
                bar.style.boxShadow = 'none';
            });

            let strengthText = "";
            let color = "";
            let activeBars = 0;

            if (entropy <= 35) {
                strengthText = "ضعيفة";
                color = "var(--danger)";
                activeBars = 1;
            } else if (entropy <= 59) {
                strengthText = "مقبولة";
                color = "var(--warning)";
                activeBars = 2;
            } else if (entropy <= 85) {
                strengthText = "جيدة";
                color = "var(--primary)";
                activeBars = 3;
            } else {
                strengthText = "قوية جداً";
                color = "var(--success)";
                activeBars = 4;
            }

            strengthLabel.textContent = strengthText;
            strengthLabel.style.color = color;

            for (let i = 0; i < activeBars; i++) {
                bars[i].style.background = color;
                bars[i].style.boxShadow = `0 0 8px ${color}80`;
            }

            timeToCrackEl.textContent = formatCrackTime(entropy);
        }

        // --- التنفيذ الرئيسي ---
        function updatePassword() {
            let newPassword = "";
            if (currentMode === 'random') {
                newPassword = generateRandomPassword();
            } else {
                newPassword = generatePassphrase();
            }
            passwordOutput.value = newPassword;
            updateUIStrength(newPassword);
        }

        // --- مستمعي الأحداث (Event Listeners) ---
        
        // التبديل بين التبويبات
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
                currentMode = tab.dataset.tab;
                
                updatePassword();
            });
        });

        // مؤشرات التمرير (Sliders)
        lengthSlider.addEventListener('input', (e) => {
            lengthVal.textContent = e.target.value;
            updatePassword();
        });

        wordSlider.addEventListener('input', (e) => {
            wordCountVal.textContent = e.target.value;
            updatePassword();
        });

        // مربعات الاختيار (Checkboxes)
        allCheckboxes.forEach(cb => cb.addEventListener('change', () => {
            // منع إلغاء تحديد آخر خيار
            const checkedCount = allCheckboxes.filter(box => box.checked).length;
            if (checkedCount === 0) {
                cb.checked = true;
                return;
            }
            updatePassword();
        }));

        separatorSelect.addEventListener('change', updatePassword);
        cbCapitalize.addEventListener('change', updatePassword);
        generateBtn.addEventListener('click', updatePassword);

        // النسخ للحافظة
        copyBtn.addEventListener('click', async () => {
            if (!passwordOutput.value) return;
            try {
                await navigator.clipboard.writeText(passwordOutput.value);
                
                // إظهار التنبيه (Toast)
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);

            } catch (err) {
                // دعم للمتصفحات القديمة
                passwordOutput.select();
                document.execCommand('copy');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            }
        });

        // منع الكتابة في مربع العرض مع السماح بتحديد النص
        passwordOutput.addEventListener('keydown', (e) => {
            if (!e.ctrlKey && !e.metaKey) {
                e.preventDefault();
            }
        });

        // التهيئة عند التحميل
        updatePassword();
    </script>
</body>
</html>
